version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: localservice-mysql
    restart: always
    environment:
      MYSQL_DATABASE: local_service_platform
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  app:
    build: .
    container_name: localservice-app
    restart: always
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/local_service_platform
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    depends_on:
      - db

volumes:
  db_data:
